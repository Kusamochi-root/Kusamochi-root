name: generate animation

on:
  # 24時間ごとに自動実行
  schedule:
    - cron: "0 0 * * *" 
  
  # 手動で実行できるようにする
  workflow_dispatch:
  
  # mainブランチにプッシュされた時も実行
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # ヘビのアニメーションを生成
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 生成されたファイルを 'output' ブランチに保存する
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

 # --- ここまでは既存の「蛇」を作るステップがあるはず ---

      # 1. Pythonの環境を作る
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 2. さっき作った Python スクリプトを実行
      - name: Execute Update Script
        run: python update_readme.py

      # 3. 蛇の画像と、更新されたREADMEをまとめてPush！
      - name: Commit and Push All Changes
        run: |
          git config --global user.name "Kusamochi-bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "chore: sync snake & system logs [skip ci]" || exit 0
          git push
